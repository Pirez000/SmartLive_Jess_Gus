<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | SmartLive Core</title>
    <link rel="stylesheet" href="formulario.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <a href="../index.html" class="btn-volver">
        <span class="flecha">←</span> VOLVER AL INICIO
    </a>

    <main class="contenedor-contacto">
        <div class="vidrio-contacto">
            
            <section class="columna info">
                <div class="caja-texto">
                    <h2>HABLA <span>CON NOSOTROS</span></h2>
                    <p>Nuestra infraestructura está abierta a nuevas ideas. Conéctate con el núcleo de SmartLive.</p>
                </div>
                <div class="redes-sociales">
                    <a href="#" class="red-link"><span>INSTAGRAM</span> / @smartlive_tech</a>
                    <a href="#" class="red-link"><span>LINKEDIN</span> / smartlive-ai</a>
                    <a href="#" class="red-link"><span>GITHUB</span> / smartlive-labs</a>
                </div>
            </section>

            <section class="columna formulario">
                <div class="titulo-form">
                    <h3>CONTACTO <span>DIRECTO</span></h3>
                </div>
                <form id="contact-form">
                    <div class="grupo-input">
                        <label>NOMBRE</label>
                        <input type="text" id="nombre" required placeholder="Tu nombre">
                    </div>
                    <div class="grupo-input">
                        <label>APELLIDOS</label>
                        <input type="text" id="apellidos" required placeholder="Tus apellidos">
                    </div>
                    <div class="grupo-input">
                        <label>PROYECTO</label>
                        <textarea id="descripcion" rows="4" required placeholder="Describe tu visión..."></textarea>
                    </div>
                    <button type="submit" class="boton-envio">
                        ENVIAR SEÑAL
                    </button>
                </form>
            </section>
            <section class="columna mapa">
                <div class="overlay-mapa">
                    <p style="font-family: 'Orbitron'; margin: 0; font-size: 0.8rem; font-weight: bold;">DIRECCION</p>
                    <small style="color: #888;">Calle Gerona 4, Valladolid</small>
                </div>
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2981.4241042732486!2d-4.7291122!3d41.6465492!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd475c024d9c0251%3A0x633513a9686036f0!2sC.%20Gerona%2C%204%2C%2047004%20Valladolid!5e0!3m2!1ses!2ses!4v1700000000000!5m2!1ses!2ses" 
                    width="100%" 
                    height="100%" 
                    style="border:0;" 
                    allowfullscreen="" 
                    loading="lazy" 
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </section>

        </div>
    </main>

    <script src="formulario.js"></script>
</body>
</html>
