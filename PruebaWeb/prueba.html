<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SmartLive - Vuelo Orgánico 3D</title>
    <style>
        body { margin: 0; background: radial-gradient(circle, #fff 0%, #d1e8ed 100%); overflow: hidden; }
        .logo-text {
            position: absolute; bottom: 5%; width: 100%; text-align: center;
            font-family: 'Arial', sans-serif; font-size: 4rem; font-weight: 100; color: #1a1a1a;
        }
    </style>
</head>
<body>
    <div class="logo-text">SmartLive</div>
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0/build/three.module.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // LUCES CINEMÁTICAS (Estilo Noomo Labs)
        const ambient = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambient);
        const pointLight = new THREE.PointLight(0x6bc0c8, 1.5);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        const birdGroup = new THREE.Group();

        // MATERIALES "SOFT-TOUCH"
        const matCuerpo = new THREE.MeshStandardMaterial({ 
            color: 0xb9e2e8, roughness: 0.3, metalness: 0.1 
        });
        const matAlas = new THREE.MeshStandardMaterial({ 
            color: 0x6bc0c8, roughness: 0.2, metalness: 0.2, side: THREE.DoubleSide 
        });

        // 1. CUERPO (Gota estilizada)
        const bodyGeo = new THREE.SphereGeometry(1, 32, 32);
        const body = new THREE.Mesh(bodyGeo, matCuerpo);
        body.scale.set(1.4, 0.8, 0.8);
        birdGroup.add(body);

        // 2. CABEZA Y PICO (Integrados)
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.6, 32, 32), matCuerpo);
        head.position.set(1.2, 0.3, 0);
        birdGroup.add(head);

        const pico = new THREE.Mesh(new THREE.ConeGeometry(0.08, 1.2, 16), new THREE.MeshStandardMaterial({color: 0x221105}));
        pico.rotation.z = -Math.PI / 1.7;
        pico.position.set(2.1, 0.1, 0);
        birdGroup.add(pico);

        // 3. ALAS ORGÁNICAS (Curvadas como el logo)
        function createWing(side) {
            const shape = new THREE.Shape();
            shape.moveTo(0, 0);
            shape.bezierCurveTo(0.5, 1.5, 2.5, 2, 3, 0.5);
            shape.bezierCurveTo(2.5, -0.5, 1, 0, 0, 0);
            
            const geo = new THREE.ExtrudeGeometry(shape, { depth: 0.05, bevelEnabled: true, bevelSize: 0.1 });
            const wing = new THREE.Mesh(geo, matAlas);
            wing.position.set(0, 0.2, 0.4 * side);
            wing.rotation.x = (Math.PI / 2) * side;
            return wing;
        }

        const leftWing = createWing(1);
        const rightWing = createWing(-1);
        birdGroup.add(leftWing, rightWing);

        scene.add(birdGroup);

        // ANIMACIÓN "A LO BESTIA"
        function animate() {
            requestAnimationFrame(animate);
            const t = Date.now() * 0.004;

            // Aleteo fluido (Sinusoidal doble)
            leftWing.rotation.y = Math.sin(t * 2) * 0.6;
            rightWing.rotation.y = -Math.sin(t * 2) * 0.6;
            
            // Inclinación de alas (Efecto medusa)
            leftWing.rotation.z = Math.cos(t * 2) * 0.2;
            rightWing.rotation.z = -Math.cos(t * 2) * 0.2;

            // Movimiento del cuerpo
            birdGroup.position.y = Math.sin(t * 0.5) * 0.5;
            birdGroup.rotation.z = Math.sin(t * 0.5) * 0.1;
            birdGroup.rotation.y = Math.sin(t * 0.2) * 0.3; // Rotación de cámara

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
