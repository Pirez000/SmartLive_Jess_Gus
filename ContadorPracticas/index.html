<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogBook FFE - Registro</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>LogBook <span>FFE</span></h1>
            <p>Registro Diario de Prácticas</p>
        </div>
    </header>

    <nav>
        <a href="index.html" class="nav-link active">Nueva Entrada</a>
        <a href="lista.html" class="nav-link">Historial y Progreso</a>
    </nav>

    <main class="container">
        <div class="card">
            <div class="card-header">
                <h2>Añadir Actividad</h2>
                <p>Completa los detalles de tu jornada laboral</p>
            </div>
            <form id="entry-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="fecha">Fecha</label>
                        <input type="date" id="fecha" required>
                    </div>
                    <div class="form-group">
                        <label for="horas">Horas (máx. 8h)</label>
                        <input type="number" id="horas" step="0.1" min="0.1" max="8" placeholder="Ej: 7.5" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="tareas">Tareas Realizadas</label>
                    <textarea id="tareas" placeholder="Escribe aquí lo que has hecho hoy..." required></textarea>
                </div>
                <button type="submit" class="btn-primary">Guardar Registro</button>
            </form>
        </div>
    </main>

    <div id="toast" class="toast"></div>
</body>
</html>
