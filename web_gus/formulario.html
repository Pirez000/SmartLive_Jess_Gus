<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - SmartLive</title>
    <link rel="stylesheet" href="form.css">
    <link rel="stylesheet" href="header_footer.css">
</head>

<body>

<header class="header">
    <div class="container header-content">

        <a href="index.html" class="logo-container">
            <img src="img/cropped-Logo_SmartLive.png" class="logo-img">
            <span class="logo-text"><strong>Smart</strong>Live</span>
        </a>

        <nav>
            <ul class="nav">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="index.html#sobre">Sobre Nosotros</a></li>
                <li><a href="index.html#servicios">Servicios</a></li>
                <li><a href="index.html#proyectos">Proyectos</a></li>
            </ul>
        </nav>

    </div>
</header>

<section class="contact-page">

    <div class="contact-wrapper">

        <!-- IZQUIERDA -->
        <div class="contact-info">

            <img src="img/cropped-Logo_SmartLive.png" class="contact-logo">

            <p>
                Cuéntanos tu idea, proyecto o necesidad tecnológica.
            </p>

            <div class="contact-data">
                <p>📩 contacto@smartlive.es</p>
                <p>📍 Valladolid, España</p>
            </div>

        </div>

        <!-- DERECHA -->
        <div class="contact-form-box">

            <h2>Contacto</h2>

            <form class="contact-form">

                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" placeholder="Tu nombre">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="tu@email.com">
                </div>

                <div class="form-group">
                    <label>Mensaje</label>
                    <textarea placeholder="Escribe tu mensaje..."></textarea>
                </div>

                <button type="submit" class="btn">
                    Enviar mensaje
                </button>

            </form>

        </div>

    </div>

</section>

</body>

</html>
